name: 🗞️ Generate Daily SIGNAL Newsletter

on:
  schedule:
    # Runs every weekday at 06:00 UTC = 07:00 CET (08:00 CEST in summer)
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # Also allows manual trigger from GitHub UI

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🤖 Generate daily-data.js via Gemini API
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          TODAY=$(date -u +"%A · %B %-d, %Y")

          PROMPT="Today is ${TODAY}. Generate a fresh daily-data.js file for the SIGNAL stock market newsletter.

          ASSETS TO COVER: RHM.DE (Rheinmetall), NVDA (NVIDIA), AMD, MSFT (Microsoft), EUNL.DE (iShares MSCI World), 4MMR.DE (Global X Defence Tech ETF), ITA (iShares US Aerospace & Defense ETF).

          Search for and include today's:
          - Latest market prices and % changes for all assets
          - Top 1-2 news stories per stock (most important catalyst today)
          - Main macro themes and their market impact
          - This week's key economic calendar events
          - One relevant market quote from today

          CRITICAL RULES:
          1. Output ONLY valid JavaScript — no markdown, no backticks, no explanation
          2. Start with exactly: window.SIGNAL_DATA = {
          3. Follow this EXACT JSON structure (copy structure, replace values with today's data):

          window.SIGNAL_DATA = {
            date: \"${TODAY}\",
            alert: { type: \"critical|warning|positive\", icon: \"emoji\", title: \"TITLE\", body: \"body text\" },
            ticker: [ { label: \"S&P 500\", value: \"0,000\", dir: \"up|down|flat\", arrow: \"▲|▼|→ X.X%\" }, ... ],
            market: [ { label: \"S&P 500\", value: \"0,000\", change: \"▲ X.X%\", dir: \"up|down|flat\" }, ... ],
            marketSummary: \"2-3 sentence summary of today's market mood. HTML allowed.\",
            stocks: [
              {
                ticker: \"RHM.DE\",
                name: \"Rheinmetall AG · XETRA\",
                price: \"€X,XXX\",
                change: \"▲/▼ X.X%\",
                dir: \"up|down|flat\",
                news: \"<strong>🔑 Today:</strong> 2-3 sentences of today's top news for this stock. HTML allowed.\",
                outlook: \"1-2 sentences static 2026 outlook. HTML allowed.\",
                badge: \"emoji + label\",
                badgeClass: \"badge-buy|badge-hold|badge-watch\"
              }
            ],
            etfs: [
              {
                ticker: \"EUNL.DE\",
                name: \"full name\",
                stats: \"Price: X\\nChange: X\\nTER: X\\nExchange: X\",
                badge: \"label\",
                badgeClass: \"badge-buy|badge-hold|badge-watch\",
                desc: \"2-3 sentence description with today's context. HTML allowed.\",
                verdict: \"1-2 sentence verdict. HTML allowed.\"
              }
            ],
            macro: [ { theme: \"emoji + name\", what: \"explanation\", impact: \"market impact\" } ],
            calendar: [ { date: \"Day Mon DD\", event: \"event name\", why: \"why it matters\" } ],
            quote: { text: \"quote text\", source: \"Name, Title · Date\" }
          };

          Include 6 market cards, 4 stocks (RHM, NVDA, AMD, MSFT), 3 ETFs (EUNL, 4MMR, ITA), 4-5 macro themes, 5-6 calendar events. Output ONLY the JavaScript, nothing else."

          # Call Gemini API with Google Search grounding (retry on 503/overload)
          PROMPT_JSON=$(echo "$PROMPT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          PAYLOAD="{
            \"contents\": [{\"role\": \"user\", \"parts\": [{\"text\": $PROMPT_JSON}]}],
            \"tools\": [{\"google_search\": {}}],
            \"generationConfig\": {\"maxOutputTokens\": 8000, \"temperature\": 0.2, \"thinkingConfig\": {\"thinkingBudget\": 0}}
          }"

          # Try many models with backoff. If all fail transiently, keep old data.
          MODELS=("gemini-2.5-flash" "gemini-2.5-flash-lite" "gemini-2.0-flash" "gemini-2.5-flash" "gemini-2.5-flash-lite" "gemini-2.0-flash-lite" "gemini-2.5-flash" "gemini-2.0-flash")
          DELAYS=(0 30 30 60 60 60 90 90)
          RESPONSE=""
          SUCCESS=0
          for i in "${!MODELS[@]}"; do
            MODEL="${MODELS[$i]}"
            DELAY="${DELAYS[$i]}"
            if [ "$DELAY" -gt 0 ]; then
              echo "⏳ Attempt $((i+1))/${#MODELS[@]} with $MODEL after ${DELAY}s..."
              sleep "$DELAY"
            else
              echo "▶️  Attempt 1/${#MODELS[@]} with $MODEL"
            fi
            RESPONSE=$(curl -s "https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=$GEMINI_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")
            STATUS=$(echo "$RESPONSE" | python3 -c "import json,sys
          try:
              d=json.load(sys.stdin)
              e=d.get('error',{})
              code=e.get('code',0)
              if code==0: print('ok')
              elif code in (429,500,502,503,504): print('retry')
              else: print('fatal')
          except: print('retry')" 2>/dev/null)
            if [ "$STATUS" = "ok" ]; then
              echo "✅ Success on attempt $((i+1)) with $MODEL"
              SUCCESS=1
              break
            elif [ "$STATUS" = "fatal" ]; then
              echo "❌ Non-retryable error — aborting retries"
              break
            else
              echo "⚠️  Transient error on $MODEL — retrying..."
            fi
          done

          echo "--- API Response (truncated) ---"
          echo "$RESPONSE" | head -c 500
          echo ""

          if [ "$SUCCESS" != "1" ]; then
            echo "⚠️  All Gemini attempts failed. Keeping previous daily-data.js so the email still goes out with last known data."
            if [ -s daily-data.js ]; then
              echo "✅ Previous daily-data.js retained ($(wc -c < daily-data.js) bytes)"
              exit 0
            else
              echo "❌ No previous daily-data.js to fall back to — aborting"
              exit 1
            fi
          fi

          # Extract text from successful response
          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          try:
              text = data['candidates'][0]['content']['parts'][0]['text'].strip()
              if text.startswith('\`\`\`'):
                  lines = text.split('\n')
                  text = '\n'.join(lines[1:-1])
              print(text)
          except (KeyError, IndexError) as e:
              print(f'ERROR parsing response: {e}', file=sys.stderr)
              print(f'Response keys: {list(data.keys())}', file=sys.stderr)
              sys.exit(1)
          " > daily-data.js.new

          if [ -s daily-data.js.new ]; then
            mv daily-data.js.new daily-data.js
            echo "✅ daily-data.js generated successfully"
            echo "--- Preview (first 5 lines) ---"
            head -5 daily-data.js
          else
            rm -f daily-data.js.new
            echo "⚠️  New data was empty. Keeping previous daily-data.js."
          fi

      - name: ✅ Validate JavaScript syntax
        run: node --check daily-data.js && echo "✅ JS syntax valid" || echo "⚠️ JS syntax error — keeping previous version"

      - name: 🔧 Inject fresh data into index.html
        run: |
          python3 <<'PYEOF'
          import re, sys

          # Read new data (strip the `window.SIGNAL_DATA = ` prefix; we need raw object for `const`)
          data_js = open('daily-data.js').read().strip()
          # Convert `window.SIGNAL_DATA = {...};` -> `const SIGNAL_DATA = {...};`
          data_js = re.sub(r'^window\.SIGNAL_DATA\s*=', 'const SIGNAL_DATA =', data_js)

          html = open('index.html').read()

          # Replace everything between the SIGNAL_DATA marker comments
          pattern = re.compile(
              r'(SIGNAL_DATA — REPLACED DAILY BY GITHUB ACTION\s*██████████████████████████████████████████████ -->\s*<script>)'
              r'.*?'
              r'(</script>\s*<!-- ██████████████████████████████████████████████\s*END SIGNAL_DATA)',
              re.DOTALL
          )

          new_html, n = pattern.subn(
              lambda m: f"{m.group(1)}\n{data_js}\n{m.group(2)}",
              html
          )

          if n != 1:
              print(f'❌ Expected 1 SIGNAL_DATA block, found {n}', file=sys.stderr)
              sys.exit(1)

          open('index.html', 'w').write(new_html)
          print('✅ index.html updated with fresh data')
          PYEOF

      - name: 📤 Commit and push updated files
        run: |
          git config --local user.email "signal-bot@github-actions"
          git config --local user.name "SIGNAL Newsletter Bot"
          git add daily-data.js index.html
          git diff --staged --quiet || git commit -m "📈 Daily update: $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

      - name: 📄 Generate PDF from index.html (Puppeteer)
        run: |
          npm install --silent puppeteer
          node <<'JSEOF'
          const puppeteer = require('puppeteer');
          const path = require('path');

          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            const fileUrl = 'file://' + path.resolve('index.html');
            await page.goto(fileUrl, { waitUntil: 'networkidle0' });
            await page.pdf({
              path: 'signal-newsletter.pdf',
              format: 'A4',
              printBackground: true,
              margin: { top: '15mm', bottom: '15mm', left: '10mm', right: '10mm' }
            });
            await browser.close();
            console.log('✅ PDF generated: signal-newsletter.pdf');
          })();
          JSEOF

      - name: 📧 Send newsletter email via Gmail SMTP
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 <<'PYEOF'
          import smtplib, os, sys
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from email.mime.application import MIMEApplication
          from datetime import datetime, timezone

          today = datetime.now(timezone.utc).strftime('%B %-d, %Y')
          sender = os.environ['GMAIL_USER']
          password = os.environ['GMAIL_APP_PASSWORD']
          recipients = ['pavel.gabriell@gmail.com', 'pavel.bogdanaa@gmail.com']

          page_url = 'https://pavelbogdanaa-prog.github.io/signal-newsletter/'

          text_body = f"""Good morning,

          Your SIGNAL daily market briefing for {today} is attached as PDF.

          View in browser: {page_url}

          — SIGNAL Newsletter
          """

          html_body = f"""<html><body style="font-family:Arial,sans-serif;font-size:14px;line-height:1.6;color:#222;">
            <p>Good morning,</p>
            <p>Your <strong>SIGNAL daily market briefing</strong> for <strong>{today}</strong> is attached as PDF.</p>
            <p>View in browser: <a href="{page_url}">{page_url}</a></p>
            <p style="color:#888;font-size:12px;">— SIGNAL Newsletter</p>
          </body></html>"""

          msg = MIMEMultipart('mixed')
          msg['Subject'] = f'📈 SIGNAL · {today}'
          msg['From'] = f'SIGNAL Newsletter <{sender}>'
          msg['To'] = ', '.join(recipients)

          alt = MIMEMultipart('alternative')
          alt.attach(MIMEText(text_body, 'plain'))
          alt.attach(MIMEText(html_body, 'html'))
          msg.attach(alt)

          with open('signal-newsletter.pdf', 'rb') as f:
              pdf = MIMEApplication(f.read(), _subtype='pdf')
              pdf.add_header('Content-Disposition', 'attachment', filename=f'SIGNAL-{today}.pdf')
              msg.attach(pdf)

          try:
            with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(sender, password)
              s.sendmail(sender, recipients, msg.as_string())
            print(f'✅ Email sent to {len(recipients)} recipients with PDF attachment')
          except Exception as e:
            print(f'❌ Email failed: {e}')
            sys.exit(1)
          PYEOF
