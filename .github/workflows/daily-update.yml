name: 🗞️ Generate Daily SIGNAL Newsletter

on:
  schedule:
    # Runs every weekday at 06:00 UTC = 07:00 CET (08:00 CEST in summer)
    - cron: '0 6 * * 1-5'
  workflow_dispatch: # Also allows manual trigger from GitHub UI

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📊 Fetch market prices via yfinance
        continue-on-error: true
        run: |
          pip install -q yfinance
          python3 <<'PYEOF'
          import yfinance as yf, json, sys
          from datetime import datetime, timezone

          SYMBOLS = [
              '^GSPC', '^IXIC', '^DJI', '^GDAXI', '^N225', '^HSI',
              'RHM.DE', 'NVDA', 'AMD', 'MSFT',
              'EUNL.DE', '4MMR.DE', 'ITA',
              'BZ=F', 'GC=F', '^TNX'
          ]

          def fmt(price, currency=''):
              if price is None: return 'N/A'
              if price >= 100000: return f'{currency}{price:,.0f}'
              return f'{currency}{price:,.2f}'

          def arrow_pct(pct):
              if pct is None: return '→ 0.0%'
              a = '▲' if pct > 0 else ('▼' if pct < 0 else '→')
              return f'{a} {abs(pct):.2f}%'

          def direction(pct):
              if pct is None: return 'flat'
              return 'up' if pct > 0.05 else ('down' if pct < -0.05 else 'flat')

          try:
              data = yf.download(SYMBOLS, period='5d', auto_adjust=True, progress=False)
              closes = data['Close']
          except Exception as e:
              print(f'❌ yfinance download failed: {e}', file=sys.stderr)
              sys.exit(1)

          def price_and_pct(sym):
              try:
                  s = closes[sym].dropna()
                  if len(s) < 1: return None, None
                  price = float(s.iloc[-1])
                  pct = float((s.iloc[-1] - s.iloc[-2]) / s.iloc[-2] * 100) if len(s) >= 2 else None
                  return price, pct
              except Exception as e:
                  print(f'⚠️  {sym}: {e}', file=sys.stderr)
                  return None, None

          INDICES = [
              ('^GSPC', 'S&P 500', ''),
              ('^IXIC', 'NASDAQ', ''),
              ('^DJI', 'Dow Jones', ''),
              ('^GDAXI', 'DAX', ''),
              ('^N225', 'Nikkei 225', ''),
              ('^HSI', 'Hang Seng', ''),
          ]
          STOCKS = [
              ('RHM.DE', 'Rheinmetall AG · XETRA', '€'),
              ('NVDA', 'NVIDIA Corp · NASDAQ', '$'),
              ('AMD', 'Advanced Micro Devices · NASDAQ', '$'),
              ('MSFT', 'Microsoft Corp · NASDAQ', '$'),
          ]
          ETFS = [
              ('EUNL.DE', 'iShares Core MSCI World UCITS ETF · XETRA', '€', '0.20%', 'XETRA'),
              ('4MMR.DE', 'Global X Defense Tech UCITS ETF · XETRA', '€', '0.50%', 'XETRA'),
              ('ITA', 'iShares U.S. Aerospace & Defense ETF · NYSE Arca', '$', '0.42%', 'NYSE Arca'),
          ]

          out = {'ticker': [], 'market': [], 'stocks': {}, 'etfs': {}, 'prices_summary': ''}
          lines = ['VERIFIED PRICES (yfinance — do NOT alter these in your output):', 'Indices:']

          for sym, label, _ in INDICES:
              price, pct = price_and_pct(sym)
              v, arr, d = fmt(price), arrow_pct(pct), direction(pct)
              out['ticker'].append({'label': label, 'value': v, 'dir': d, 'arrow': arr})
              out['market'].append({'label': label, 'value': v, 'change': arr, 'dir': d})
              lines.append(f'  {label}: {v} ({arr})')

          lines.append('Stocks:')
          for sym, name, currency in STOCKS:
              price, pct = price_and_pct(sym)
              v, arr, d = fmt(price, currency), arrow_pct(pct), direction(pct)
              out['stocks'][sym] = {'price': v, 'change': arr, 'dir': d}
              lines.append(f'  {sym}: {v} ({arr})')

          lines.append('ETFs:')
          for sym, name, currency, ter, exchange in ETFS:
              price, pct = price_and_pct(sym)
              v, arr, d = fmt(price, currency), arrow_pct(pct), direction(pct)
              out['etfs'][sym] = {
                  'price': v, 'change': arr, 'dir': d,
                  'stats': f'Price: {v}\nChange: {arr}\nTER: {ter}\nExchange: {exchange}'
              }
              lines.append(f'  {sym}: {v} ({arr})')

          lines.append('Commodities/Bonds (context only):')
          for sym, label, currency, suffix in [
              ('BZ=F', 'Brent Oil', '$', ''), ('GC=F', 'Gold', '$', ''), ('^TNX', '10Y Treasury', '', '%')
          ]:
              price, pct = price_and_pct(sym)
              v = (fmt(price, currency) if price else 'N/A') + suffix
              lines.append(f'  {label}: {v} ({arrow_pct(pct)})')

          out['prices_summary'] = '\n'.join(lines)
          with open('prices.json', 'w') as f:
              json.dump(out, f, indent=2, ensure_ascii=False)
          print('✅ prices.json written')
          print('\n'.join(lines))
          PYEOF

      - name: 🤖 Generate commentary via Gemini API
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python3 <<'PYEOF'
          import json, os, sys, time
          import urllib.request, urllib.error

          TODAY = __import__('datetime').datetime.now(__import__('datetime').timezone.utc).strftime('%A · %B %-d, %Y')
          API_KEY = os.environ['GEMINI_API_KEY']

          try:
              prices_data = json.load(open('prices.json'))
              prices_text = prices_data.get('prices_summary', 'Prices unavailable')
          except Exception:
              prices_text = 'Prices unavailable — use your best estimate'

          PROMPT = f"""Today is {TODAY}.

          {prices_text}

          You are writing the SIGNAL stock market newsletter. The prices above are exact and verified — do NOT include or change price/change values in your output. Your job is ONLY to generate commentary and news.

          Using Google Search, find today's top news and write commentary. Output ONLY valid JSON (no markdown, no backticks, no explanation). Follow this exact structure:

          {{
            "alert": {{ "type": "critical|warning|positive", "icon": "emoji", "title": "SHORT TITLE", "body": "1-2 sentence body" }},
            "marketSummary": "2-3 sentence summary of today's market mood. HTML allowed.",
            "stocks": {{
              "RHM.DE": {{ "news": "<strong>🔑 Today:</strong> 2-3 sentences on today's top catalyst. HTML allowed.", "outlook": "1-2 sentence 2026 outlook.", "badge": "emoji + label", "badgeClass": "badge-buy|badge-hold|badge-watch" }},
              "NVDA":   {{ "news": "...", "outlook": "...", "badge": "...", "badgeClass": "..." }},
              "AMD":    {{ "news": "...", "outlook": "...", "badge": "...", "badgeClass": "..." }},
              "MSFT":   {{ "news": "...", "outlook": "...", "badge": "...", "badgeClass": "..." }}
            }},
            "etfs": {{
              "EUNL.DE": {{ "desc": "2-3 sentence description with today's context. HTML allowed.", "verdict": "1-2 sentence verdict.", "badge": "label", "badgeClass": "badge-buy|badge-hold|badge-watch" }},
              "4MMR.DE": {{ "desc": "...", "verdict": "...", "badge": "...", "badgeClass": "..." }},
              "ITA":     {{ "desc": "...", "verdict": "...", "badge": "...", "badgeClass": "..." }}
            }},
            "macro":    [ {{ "theme": "emoji + name", "what": "explanation", "impact": "market impact" }} ],
            "calendar": [ {{ "date": "Day Mon DD", "event": "event name", "why": "why it matters" }} ],
            "quote":    {{ "text": "quote text", "source": "Name, Title · Date" }}
          }}

          Include 4-5 macro themes and 5-6 calendar events. Output ONLY the JSON object."""

          payload = json.dumps({
              'contents': [{'role': 'user', 'parts': [{'text': PROMPT}]}],
              'tools': [{'google_search': {}}],
              'generationConfig': {'maxOutputTokens': 4000, 'temperature': 0.2, 'thinkingConfig': {'thinkingBudget': 0}}
          }).encode()

          MODELS = ['gemini-2.5-flash', 'gemini-2.5-flash-lite', 'gemini-2.0-flash',
                    'gemini-2.5-flash', 'gemini-2.5-flash-lite', 'gemini-2.0-flash-lite',
                    'gemini-2.5-flash', 'gemini-2.0-flash']
          DELAYS = [0, 30, 30, 60, 60, 60, 90, 90]

          result_text = None
          for i, (model, delay) in enumerate(zip(MODELS, DELAYS)):
              if delay: print(f'⏳ Attempt {i+1}/{len(MODELS)} with {model} after {delay}s...'); time.sleep(delay)
              else: print(f'▶️  Attempt 1/{len(MODELS)} with {model}')
              url = f'https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent?key={API_KEY}'
              try:
                  req = urllib.request.Request(url, data=payload, headers={'Content-Type': 'application/json'})
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      data = json.loads(resp.read())
              except Exception as e:
                  print(f'⚠️  Request error: {e}')
                  continue
              err = data.get('error', {})
              code = err.get('code', 0)
              if code in (429, 500, 502, 503, 504):
                  print(f'⚠️  Transient {code} on {model} — retrying...')
                  continue
              elif code != 0:
                  print(f'❌ Fatal error {code}: {err.get("message")}')
                  break
              try:
                  text = data['candidates'][0]['content']['parts'][0]['text'].strip()
                  if text.startswith('```'):
                      lines = text.split('\n')
                      text = '\n'.join(lines[1:-1] if lines[-1].strip() == '```' else lines[1:])
                  json.loads(text)  # validate
                  result_text = text
                  print(f'✅ Success on attempt {i+1} with {model}')
                  break
              except Exception as e:
                  print(f'⚠️  Parse error: {e}')
                  continue

          if result_text:
              with open('commentary.json', 'w') as f:
                  f.write(result_text)
              print('✅ commentary.json written')
          else:
              print('⚠️  All Gemini attempts failed — merge step will use fallback commentary')
          PYEOF

      - name: 🔀 Merge prices + commentary into daily-data.js
        continue-on-error: true
        run: |
          python3 <<'PYEOF'
          import json, sys
          from datetime import datetime, timezone

          TODAY = datetime.now(timezone.utc).strftime('%A · %B %-d, %Y')

          try:
              prices = json.load(open('prices.json'))
          except Exception as e:
              print(f'❌ Cannot read prices.json: {e}', file=sys.stderr)
              sys.exit(1)

          try:
              commentary = json.load(open('commentary.json'))
          except Exception:
              commentary = {}
              print('⚠️  No commentary.json — using fallback text')

          STOCKS_META = [
              ('RHM.DE', 'Rheinmetall AG · XETRA'),
              ('NVDA',   'NVIDIA Corp · NASDAQ'),
              ('AMD',    'Advanced Micro Devices · NASDAQ'),
              ('MSFT',   'Microsoft Corp · NASDAQ'),
          ]
          ETFS_META = [
              ('EUNL.DE', 'iShares Core MSCI World UCITS ETF · XETRA'),
              ('4MMR.DE', 'Global X Defense Tech UCITS ETF · XETRA'),
              ('ITA',     'iShares U.S. Aerospace & Defense ETF · NYSE Arca'),
          ]

          c_stocks = commentary.get('stocks', {})
          c_etfs   = commentary.get('etfs', {})

          stocks_out = []
          for sym, name in STOCKS_META:
              p = prices.get('stocks', {}).get(sym, {})
              c = c_stocks.get(sym, {})
              stocks_out.append({
                  'ticker':     sym,
                  'name':       name,
                  'price':      p.get('price', 'N/A'),
                  'change':     p.get('change', '→ 0.0%'),
                  'dir':        p.get('dir', 'flat'),
                  'news':       c.get('news', '<strong>🔑 Today:</strong> Commentary pending.'),
                  'outlook':    c.get('outlook', '2026 outlook pending.'),
                  'badge':      c.get('badge', '📊 Monitor'),
                  'badgeClass': c.get('badgeClass', 'badge-hold'),
              })

          etfs_out = []
          for sym, name in ETFS_META:
              p = prices.get('etfs', {}).get(sym, {})
              c = c_etfs.get(sym, {})
              etfs_out.append({
                  'ticker':     sym,
                  'name':       name,
                  'stats':      p.get('stats', 'Price: N/A\nChange: N/A'),
                  'badge':      c.get('badge', 'ETF'),
                  'badgeClass': c.get('badgeClass', 'badge-hold'),
                  'desc':       c.get('desc', 'ETF commentary pending.'),
                  'verdict':    c.get('verdict', 'Verdict pending.'),
              })

          data = {
              'date':          TODAY,
              'alert':         commentary.get('alert', {'type': 'positive', 'icon': 'ℹ️', 'title': 'Market Update', 'body': 'Live prices from yfinance.'}),
              'ticker':        prices.get('ticker', []),
              'market':        prices.get('market', []),
              'marketSummary': commentary.get('marketSummary', 'Market summary loading.'),
              'stocks':        stocks_out,
              'etfs':          etfs_out,
              'macro':         commentary.get('macro', []),
              'calendar':      commentary.get('calendar', []),
              'quote':         commentary.get('quote', {'text': 'Markets in motion.', 'source': f'SIGNAL · {TODAY}'}),
          }

          js = 'window.SIGNAL_DATA = ' + json.dumps(data, indent=2, ensure_ascii=False) + ';'
          with open('daily-data.js', 'w') as f:
              f.write(js)
          print('✅ daily-data.js written')
          for s in stocks_out:
              print(f'  {s["ticker"]}: {s["price"]} {s["change"]}')
          PYEOF

      - name: ✅ Validate JavaScript syntax
        continue-on-error: true
        run: node --check daily-data.js && echo "✅ JS syntax valid" || echo "⚠️ JS syntax error — keeping previous version"

      - name: 🔧 Inject fresh data into index.html
        continue-on-error: true
        run: |
          python3 <<'PYEOF'
          import re, sys

          # Read new data (strip the `window.SIGNAL_DATA = ` prefix; we need raw object for `const`)
          data_js = open('daily-data.js').read().strip()
          # Convert `window.SIGNAL_DATA = {...};` -> `const SIGNAL_DATA = {...};`
          data_js = re.sub(r'^window\.SIGNAL_DATA\s*=', 'const SIGNAL_DATA =', data_js)

          html = open('index.html').read()

          # Replace everything between the SIGNAL_DATA marker comments
          pattern = re.compile(
              r'(SIGNAL_DATA — REPLACED DAILY BY GITHUB ACTION\s*██████████████████████████████████████████████ -->\s*<script>)'
              r'.*?'
              r'(</script>\s*<!-- ██████████████████████████████████████████████\s*END SIGNAL_DATA)',
              re.DOTALL
          )

          new_html, n = pattern.subn(
              lambda m: f"{m.group(1)}\n{data_js}\n{m.group(2)}",
              html
          )

          if n != 1:
              print(f'❌ Expected 1 SIGNAL_DATA block, found {n}', file=sys.stderr)
              sys.exit(1)

          open('index.html', 'w').write(new_html)
          print('✅ index.html updated with fresh data')
          PYEOF

      - name: 📤 Commit and push updated files
        continue-on-error: true
        run: |
          git config --local user.email "signal-bot@github-actions"
          git config --local user.name "SIGNAL Newsletter Bot"
          git add daily-data.js index.html
          git diff --staged --quiet || git commit -m "📈 Daily update: $(date -u +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

      - name: 📄 Generate PDF from index.html (Puppeteer)
        run: |
          npm install --silent puppeteer
          node <<'JSEOF'
          const puppeteer = require('puppeteer');
          const path = require('path');

          (async () => {
            const browser = await puppeteer.launch({ args: ['--no-sandbox'] });
            const page = await browser.newPage();
            const fileUrl = 'file://' + path.resolve('index.html');
            await page.goto(fileUrl, { waitUntil: 'networkidle0' });
            await page.pdf({
              path: 'signal-newsletter.pdf',
              format: 'A4',
              printBackground: true,
              margin: { top: '15mm', bottom: '15mm', left: '10mm', right: '10mm' }
            });
            await browser.close();
            console.log('✅ PDF generated: signal-newsletter.pdf');
          })();
          JSEOF

      - name: 📧 Send newsletter email via Gmail SMTP
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          python3 <<'PYEOF'
          import smtplib, os, sys
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          from email.mime.application import MIMEApplication
          from datetime import datetime, timezone

          today = datetime.now(timezone.utc).strftime('%B %-d, %Y')
          sender = os.environ['GMAIL_USER']
          password = os.environ['GMAIL_APP_PASSWORD']
          recipients = ['pavel.gabriell@gmail.com', 'pavel.bogdanaa@gmail.com']

          page_url = 'https://pavelbogdanaa-prog.github.io/signal-newsletter/'

          text_body = f"""Good morning,

          Your SIGNAL daily market briefing for {today} is attached as PDF.

          View in browser: {page_url}

          — SIGNAL Newsletter
          """

          html_body = f"""<html><body style="font-family:Arial,sans-serif;font-size:14px;line-height:1.6;color:#222;">
            <p>Good morning,</p>
            <p>Your <strong>SIGNAL daily market briefing</strong> for <strong>{today}</strong> is attached as PDF.</p>
            <p>View in browser: <a href="{page_url}">{page_url}</a></p>
            <p style="color:#888;font-size:12px;">— SIGNAL Newsletter</p>
          </body></html>"""

          msg = MIMEMultipart('mixed')
          msg['Subject'] = f'📈 SIGNAL · {today}'
          msg['From'] = f'SIGNAL Newsletter <{sender}>'
          msg['To'] = ', '.join(recipients)

          alt = MIMEMultipart('alternative')
          alt.attach(MIMEText(text_body, 'plain'))
          alt.attach(MIMEText(html_body, 'html'))
          msg.attach(alt)

          with open('signal-newsletter.pdf', 'rb') as f:
              pdf = MIMEApplication(f.read(), _subtype='pdf')
              pdf.add_header('Content-Disposition', 'attachment', filename=f'SIGNAL-{today}.pdf')
              msg.attach(pdf)

          try:
            with smtplib.SMTP_SSL('smtp.gmail.com', 465) as s:
              s.login(sender, password)
              s.sendmail(sender, recipients, msg.as_string())
            print(f'✅ Email sent to {len(recipients)} recipients with PDF attachment')
          except Exception as e:
            print(f'❌ Email failed: {e}')
            sys.exit(1)
          PYEOF
